version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Bucharest 
    volumes:
      - n8n_data:/home/node/.n8n

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    volumes: 
      - ./frontend:/app
      - /app/node_modules

  backend:

    build: ./backend

    restart: always

    ports:

      - "8000:8000"

    env_file:

      - .env
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  n8n_data:
  qdrant_data: